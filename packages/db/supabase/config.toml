# Supabase local config for BigManThing.
# Generated minimal config — run `supabase init` to regenerate the canonical version
# if Supabase CLI updates the format.

project_id = "bigmanthing"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false   # local dev convenience; production should be true

[storage]
enabled = true
file_size_limit = "50MiB"

[edge_runtime]
enabled = true
